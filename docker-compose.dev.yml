version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: anonymouswall_pg
    environment:
      POSTGRES_DB: anonymous_wall
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: anonymouswall_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

volumes:
  pg_data:
