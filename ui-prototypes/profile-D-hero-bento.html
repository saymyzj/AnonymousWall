<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile D — Hero Bento Blend</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d1a;
    --bg-soft: #12152a;
    --panel: rgba(18, 21, 42, 0.72);
    --panel-strong: rgba(16, 18, 34, 0.9);
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.14);
    --text-1: #ece9f7;
    --text-2: #a5a1ba;
    --text-3: #6a6882;
    --brand: #7c5cfc;
    --pink: #ff6b9d;
    --cyan: #06d6a0;
    --radius-xl: 32px;
    --radius-lg: 24px;
    --radius-md: 18px;
    --pill: 999px;
    --shadow: 0 28px 80px rgba(0, 0, 0, 0.34);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
  }
  body {
    font-family: var(--font);
    min-height: 100vh;
    background:
      radial-gradient(circle at 18% 85%, rgba(255, 107, 157, 0.18), transparent 24%),
      radial-gradient(circle at 82% 18%, rgba(124, 92, 252, 0.22), transparent 28%),
      linear-gradient(180deg, #0a0d1d 0%, #090b16 100%);
    color: var(--text-1);
    overflow-x: hidden;
  }
  .stars, .nebula { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle 3.4s ease-in-out infinite alternate;
  }
  .nebula::before, .nebula::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(110px);
  }
  .nebula::before {
    width: 480px;
    height: 480px;
    left: -120px;
    bottom: -120px;
    background: rgba(255, 107, 157, 0.18);
  }
  .nebula::after {
    width: 540px;
    height: 540px;
    right: -160px;
    top: -120px;
    background: rgba(124, 92, 252, 0.2);
  }
  @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.8; } }

  .nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    height: 68px;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(11, 13, 26, 0.66);
    backdrop-filter: blur(24px) saturate(1.5);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .nav-logo {
    color: var(--text-1);
    text-decoration: none;
    font-size: 18px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-logo strong {
    background: linear-gradient(135deg, var(--pink), #c28cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .nav-actions { display: flex; gap: 12px; }
  .nav-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-2);
    display: grid;
    place-items: center;
    font-size: 16px;
  }

  .hero {
    position: relative;
    z-index: 1;
    min-height: 620px;
    padding: 120px 24px 170px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-shell {
    width: min(860px, 100%);
    text-align: center;
    position: relative;
  }
  .hero-rings {
    width: 132px;
    height: 132px;
    margin: 0 auto 28px;
    padding: 5px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--brand), var(--pink));
    box-shadow: 0 0 40px rgba(124, 92, 252, 0.24);
  }
  .hero-avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.12), transparent 40%), var(--bg);
  }
  .hero-avatar svg { width: 72px; height: 72px; }
  .hero-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    margin-bottom: 18px;
    border-radius: var(--pill);
    border: 1px solid rgba(124, 92, 252, 0.25);
    background: rgba(124, 92, 252, 0.1);
    color: #d3caff;
    font-size: 13px;
    letter-spacing: 0.04em;
  }
  .hero-name {
    font-size: clamp(42px, 5vw, 64px);
    line-height: 1.04;
    font-weight: 800;
    margin-bottom: 14px;
  }
  .hero-meta {
    color: var(--text-2);
    font-size: 18px;
    margin-bottom: 12px;
  }
  .hero-join {
    color: var(--text-3);
    font-size: 16px;
    margin-bottom: 28px;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 26px;
  }
  .hero-stat {
    min-width: 142px;
    padding: 16px 18px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(10px);
  }
  .hero-stat strong {
    display: block;
    font-size: 28px;
    margin-bottom: 4px;
  }
  .hero-stat span { color: var(--text-3); font-size: 13px; }
  .hero-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
  }
  .primary-btn, .ghost-btn {
    padding: 13px 26px;
    border-radius: var(--pill);
    border: 1px solid transparent;
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .primary-btn {
    color: #fff;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    box-shadow: 0 12px 30px rgba(124, 92, 252, 0.25);
  }
  .ghost-btn {
    color: var(--text-1);
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--line);
  }
  .floating-tag {
    position: absolute;
    padding: 12px 16px;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: rgba(12, 14, 28, 0.55);
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow);
    color: var(--text-2);
    font-size: 13px;
    text-align: left;
  }
  .floating-tag strong {
    display: block;
    color: var(--text-1);
    margin-bottom: 4px;
    font-size: 14px;
  }
  .tag-left { left: -14px; top: 22%; }
  .tag-right { right: -22px; top: 14%; }
  .tag-bottom { right: 38px; bottom: 10%; }

  .dashboard-wrap {
    position: relative;
    z-index: 2;
    width: min(1360px, calc(100% - 48px));
    margin: -100px auto 48px;
  }
  .dashboard {
    display: grid;
    grid-template-columns: 1.8fr 1fr 1fr;
    gap: 18px;
  }
  .panel {
    border-radius: var(--radius-xl);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(17, 19, 36, 0.9), rgba(12, 14, 28, 0.96));
    backdrop-filter: blur(16px);
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
  }
  .panel-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 800;
  }
  .panel-link {
    color: #9c84ff;
    text-decoration: none;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: var(--pill);
    border: 1px solid rgba(124, 92, 252, 0.22);
    background: rgba(124, 92, 252, 0.08);
  }
  .recent-list, .comment-list { display: grid; gap: 16px; }
  .post-card {
    padding: 22px;
    border-radius: 24px;
    border: 1px solid transparent;
  }
  .post-card.p1 { background: linear-gradient(135deg, rgba(255,107,157,0.16), rgba(255,182,193,0.08)); border-color: rgba(255,107,157,0.24); }
  .post-card.p2 { background: linear-gradient(135deg, rgba(255,165,89,0.16), rgba(255,200,120,0.08)); border-color: rgba(255,165,89,0.24); }
  .post-card.p3 { background: linear-gradient(135deg, rgba(6,214,160,0.16), rgba(100,230,180,0.08)); border-color: rgba(6,214,160,0.24); }
  .post-card.p4 { background: linear-gradient(135deg, rgba(100,180,255,0.16), rgba(150,200,255,0.08)); border-color: rgba(100,180,255,0.24); }
  .post-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .post-user {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar-mini {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #8a68ff, #ff6b9d);
    font-size: 16px;
  }
  .post-name { font-weight: 700; font-size: 16px; }
  .post-time { font-size: 13px; color: var(--text-3); }
  .post-body {
    color: #d6d1e7;
    font-size: 16px;
    line-height: 1.8;
    margin-bottom: 16px;
  }
  .post-meta, .bookmark-meta {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    color: var(--text-3);
    font-size: 14px;
  }
  .comment-card {
    padding: 18px;
    border-radius: 22px;
    border: 1px solid rgba(255, 255, 255, 0.07);
    background: rgba(255, 255, 255, 0.035);
  }
  .comment-text {
    font-size: 16px;
    line-height: 1.75;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .comment-meta {
    color: var(--text-3);
    font-size: 13px;
    line-height: 1.6;
  }
  .comment-meta a {
    color: #8e75ff;
    text-decoration: none;
  }
  .bookmark-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }
  .bookmark-card {
    min-height: 182px;
    padding: 18px;
    border-radius: 22px;
    border: 1px solid transparent;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .bookmark-card.b1 { background: linear-gradient(135deg, rgba(255,107,157,0.14), rgba(255,182,193,0.08)); border-color: rgba(255,107,157,0.22); }
  .bookmark-card.b2 { background: linear-gradient(135deg, rgba(100,180,255,0.14), rgba(150,200,255,0.08)); border-color: rgba(100,180,255,0.22); }
  .bookmark-card.b3 { background: linear-gradient(135deg, rgba(124,92,252,0.14), rgba(180,160,255,0.08)); border-color: rgba(124,92,252,0.22); }
  .bookmark-card.b4 { background: linear-gradient(135deg, rgba(255,230,100,0.14), rgba(255,240,150,0.08)); border-color: rgba(255,230,100,0.22); }
  .bookmark-body {
    color: #d5d0e8;
    font-size: 15px;
    line-height: 1.75;
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  @media (max-width: 1180px) {
    .dashboard { grid-template-columns: 1fr; }
    .tag-left, .tag-right, .tag-bottom { display: none; }
  }
  @media (max-width: 720px) {
    .nav { padding: 0 16px; }
    .hero { padding: 104px 18px 150px; min-height: 560px; }
    .hero-name { font-size: 38px; }
    .hero-meta, .hero-join { font-size: 15px; }
    .dashboard-wrap { width: calc(100% - 24px); margin-top: -88px; }
    .panel { padding: 18px; border-radius: 24px; }
    .bookmark-grid { grid-template-columns: 1fr; }
    .hero-stat { min-width: calc(50% - 8px); }
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="nebula"></div>

<nav class="nav">
  <a class="nav-logo" href="#"><span>🫧</span><strong>匿名星球</strong></a>
  <div class="nav-actions">
    <div class="nav-btn">🔍</div>
    <div class="nav-btn">🔔</div>
    <div class="nav-btn" style="border-color:rgba(124,92,252,0.4); color:#fff;">👤</div>
  </div>
</nav>

<section class="hero">
  <div class="hero-shell">
    <div class="floating-tag tag-left"><strong>匿名标签</strong>理性分享者 · 夜晚活跃</div>
    <div class="floating-tag tag-right"><strong>近 30 天</strong>发布频率超过 87% 用户</div>
    <div class="floating-tag tag-bottom"><strong>偏好主题</strong>树洞 / 职场 / 学习方法</div>
    <div class="hero-rings">
      <div class="hero-avatar">
        <svg viewBox="0 0 72 72" fill="none">
          <circle cx="36" cy="25" r="11" fill="rgba(255,255,255,0.92)"/>
          <path d="M14 60c0-12.15 9.85-22 22-22s22 9.85 22 22" fill="rgba(255,255,255,0.72)"/>
          <rect x="18" y="10" width="8" height="8" rx="2" fill="rgba(255,255,255,0.25)" transform="rotate(16 22 14)"/>
          <rect x="47" y="12" width="7" height="7" rx="2" fill="rgba(255,255,255,0.22)" transform="rotate(-12 50.5 15.5)"/>
          <circle cx="36" cy="25" r="4.5" fill="rgba(124,92,252,0.66)"/>
        </svg>
      </div>
    </div>
    <div class="hero-kicker">B 的沉浸式头部 + C 的三栏下半区</div>
    <h1 class="hero-name">星际旅行者 #4827</h1>
    <div class="hero-meta">u***2@example.com</div>
    <div class="hero-join">🚀 2024 年 3 月加入匿名星球</div>
    <div class="hero-stats">
      <div class="hero-stat"><strong>23</strong><span>累计发布</span></div>
      <div class="hero-stat"><strong>156</strong><span>评论互动</span></div>
      <div class="hero-stat"><strong>892</strong><span>收到赞同</span></div>
    </div>
    <div class="hero-actions">
      <button class="primary-btn">编辑个人资料</button>
      <button class="ghost-btn">隐私与展示设置</button>
    </div>
  </div>
</section>

<main class="dashboard-wrap">
  <div class="dashboard">
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">📝 最近发布</div>
        <a class="panel-link" href="#">查看全部 →</a>
      </div>
      <div class="recent-list" id="recentPosts"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">💬 评论动态</div>
        <a class="panel-link" href="#">查看全部 →</a>
      </div>
      <div class="comment-list" id="recentComments"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">⭐ 收藏夹</div>
        <a class="panel-link" href="#">查看全部 →</a>
      </div>
      <div class="bookmark-grid" id="bookmarkGrid"></div>
    </section>
  </div>
</main>

<script>
  (function renderStars() {
    const root = document.getElementById("stars");
    for (let i = 0; i < 120; i += 1) {
      const star = document.createElement("span");
      const size = Math.random() * 2.4 + 0.6;
      star.className = "star";
      star.style.width = size + "px";
      star.style.height = size + "px";
      star.style.left = Math.random() * 100 + "%";
      star.style.top = Math.random() * 100 + "%";
      star.style.animationDelay = Math.random() * 4 + "s";
      star.style.animationDuration = 2 + Math.random() * 4 + "s";
      root.appendChild(star);
    }
  })();

  const posts = [
    { color: "p1", time: "2小时前", body: "有时候觉得，孤独不是身边没有人，而是心里的话找不到能说的人。深夜的城市灯火辉煌，却照不亮内心的角落。", likes: 42, comments: 8, views: 134 },
    { color: "p2", time: "5小时前", body: "同事把咖啡倒在了老板的键盘上，整个办公室都安静了。然后老板说：这是我喝过最贵的咖啡。", likes: 128, comments: 23, views: 409 },
    { color: "p3", time: "昨天", body: "最近发现费曼学习法真的很有效。把学到的东西用最简单的话解释给别人听，如果对方能理解，说明你真的学会了。", likes: 89, comments: 15, views: 284 },
    { color: "p4", time: "2天前", body: "远程工作一年了，最大的感受是自律比能力更重要。没有了打卡的约束，全靠自己管理时间。", likes: 67, comments: 12, views: 208 }
  ];

  const comments = [
    { time: "1小时前", post: "关于孤独", text: "说得太对了，孤独是一种很微妙的感觉，不是寂寞而是一种无法言说的距离感。" },
    { time: "3小时前", post: "公司搞笑事", text: "哈哈哈老板的反应绝了，这种时刻真的只想装作不存在。" },
    { time: "5小时前", post: "分享学习方法", text: "费曼学习法确实好用，我也在实践。补充一点：写博客也是一种很好的输出方式。" }
  ];

  const bookmarks = [
    { color: "b1", body: "有时候觉得，孤独不是身边没有人，而是身边没人能懂你。", likes: 42, comments: 8 },
    { color: "b2", body: "同事把咖啡倒在了老板的键盘上，整个办公室都安静了。", likes: 128, comments: 23 },
    { color: "b3", body: "最近发现费曼学习法真的很有效，把复杂知识讲明白才算真正掌握。", likes: 89, comments: 15 },
    { color: "b4", body: "远程工作一年了，最大的感受是自律比能力更重要。", likes: 67, comments: 12 }
  ];

  document.getElementById("recentPosts").innerHTML = posts.map((post) => `
    <article class="post-card ${post.color}">
      <div class="post-head">
        <div class="post-user">
          <div class="avatar-mini">👤</div>
          <div>
            <div class="post-name">星际旅行者 #4827</div>
            <div class="post-time">${post.time}</div>
          </div>
        </div>
        <div class="post-time">${post.time}</div>
      </div>
      <div class="post-body">${post.body}</div>
      <div class="post-meta"><span>❤️ ${post.likes}</span><span>💬 ${post.comments}</span><span>👁 ${post.views}</span></div>
    </article>
  `).join("");

  document.getElementById("recentComments").innerHTML = comments.map((item) => `
    <article class="comment-card">
      <div class="comment-text">${item.text}</div>
      <div class="comment-meta">${item.time}<br><a href="#">📎 ${item.post}</a></div>
    </article>
  `).join("");

  document.getElementById("bookmarkGrid").innerHTML = bookmarks.map((item) => `
    <article class="bookmark-card ${item.color}">
      <div class="bookmark-body">${item.body}</div>
      <div class="bookmark-meta"><span>❤️ ${item.likes}</span><span>💬 ${item.comments}</span></div>
    </article>
  `).join("");
</script>
</body>
</html>
