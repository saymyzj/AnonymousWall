<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile A — Sidebar Navigation (个人中心)</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0B0D1A;
    --bg-surface: #12152A;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.08);
    --text-1: #E8E6F0;
    --text-2: #9896A8;
    --text-3: #5D5B6E;
    --brand: #7C5CFC;
    --brand-glow: rgba(124,92,252,0.25);
    --pink: #FF6B9D;
    --pink-glow: rgba(255,107,157,0.2);
    --cyan: #06D6A0;
    --radius-bubble: 24px;
    --radius-pill: 999px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
    --border: rgba(255,255,255,0.08);

    --b1: linear-gradient(135deg, rgba(255,107,157,0.18), rgba(255,182,193,0.12));
    --b2: linear-gradient(135deg, rgba(255,165,89,0.18), rgba(255,200,120,0.12));
    --b3: linear-gradient(135deg, rgba(6,214,160,0.18), rgba(100,230,180,0.12));
    --b4: linear-gradient(135deg, rgba(100,180,255,0.18), rgba(150,200,255,0.12));
    --b5: linear-gradient(135deg, rgba(124,92,252,0.18), rgba(180,160,255,0.12));
    --b6: linear-gradient(135deg, rgba(255,230,100,0.18), rgba(255,240,150,0.12));
    --b7: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    --b8: linear-gradient(135deg, rgba(200,160,120,0.18), rgba(220,180,140,0.12));

    --b1-border: rgba(255,107,157,0.2);
    --b2-border: rgba(255,165,89,0.2);
    --b3-border: rgba(6,214,160,0.2);
    --b4-border: rgba(100,180,255,0.2);
    --b5-border: rgba(124,92,252,0.2);
    --b6-border: rgba(255,230,100,0.2);
    --b7-border: rgba(255,255,255,0.08);
    --b8-border: rgba(200,160,120,0.2);
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-1);
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== STARS ===== */
  .stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 3s ease-in-out infinite alternate; }
  @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }

  .nebula { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
  .nebula-1 { width: 500px; height: 500px; top: -150px; right: -100px; background: var(--brand-glow); }
  .nebula-2 { width: 400px; height: 400px; bottom: -100px; left: -80px; background: var(--pink-glow); }
  .nebula-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(6,214,160,0.08); }

  /* ===== NAV ===== */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 64px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    background: rgba(11,13,26,0.7);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; text-decoration: none;
  }
  .nav-logo span { font-size: 22px; -webkit-text-fill-color: initial; }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04); color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: all 0.2s;
  }
  .nav-icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-1); }
  .nav-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid var(--brand);
    cursor: pointer; overflow: hidden;
  }

  /* ===== LAYOUT ===== */
  .layout {
    display: flex; margin-top: 64px; min-height: calc(100vh - 64px);
    position: relative; z-index: 1;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 260px; min-width: 260px;
    padding: 32px 20px;
    border-right: 1px solid var(--border);
    background: rgba(11,13,26,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: sticky; top: 64px; height: calc(100vh - 64px);
    overflow-y: auto;
  }

  /* User card */
  .user-card {
    text-align: center; padding: 24px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-bubble);
    margin-bottom: 24px;
  }
  .user-avatar {
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .user-avatar svg { width: 48px; height: 48px; }
  .user-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .user-email { font-size: 13px; color: var(--text-3); margin-bottom: 16px; }
  .user-stats {
    display: flex; justify-content: space-around;
    border-top: 1px solid var(--border); padding-top: 16px;
  }
  .user-stat-item { text-align: center; }
  .user-stat-num { font-size: 18px; font-weight: 700; color: var(--text-1); }
  .user-stat-label { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* Nav items */
  .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
  .sidebar-nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 12px;
    font-size: 14px; font-weight: 500; color: var(--text-2);
    cursor: pointer; transition: all 0.2s;
    border: none; background: transparent; width: 100%;
    text-align: left; position: relative;
  }
  .sidebar-nav-item:hover { color: var(--text-1); background: rgba(255,255,255,0.04); }
  .sidebar-nav-item.active {
    color: var(--brand); background: rgba(124,92,252,0.08);
    border-left: 3px solid var(--brand); padding-left: 13px;
  }
  .sidebar-nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
  .sidebar-nav-item .badge {
    margin-left: auto; background: var(--brand); color: #fff;
    font-size: 11px; padding: 2px 8px; border-radius: var(--radius-pill);
    font-weight: 600;
  }

  /* ===== CONTENT ===== */
  .content {
    flex: 1; padding: 32px 40px; max-width: 960px;
  }

  .content-section { display: none; }
  .content-section.active { display: block; }

  .section-title {
    font-size: 22px; font-weight: 700; margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
  }

  /* Stats banner */
  .stats-banner {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    padding: 20px 24px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: var(--radius-bubble);
    text-align: center;
    transition: all 0.3s;
  }
  .stat-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }
  .stat-card .num {
    font-size: 32px; font-weight: 800;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-card:nth-child(2) .num {
    background: linear-gradient(135deg, var(--cyan), #64B4FF);
    -webkit-background-clip: text; background-clip: text;
  }
  .stat-card:nth-child(3) .num {
    background: linear-gradient(135deg, var(--pink), #FF9B6A);
    -webkit-background-clip: text; background-clip: text;
  }
  .stat-card .label { font-size: 13px; color: var(--text-3); margin-top: 4px; }

  /* Post grid */
  .post-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
  }
  .post-card {
    padding: 20px; border-radius: var(--radius-bubble);
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.3s; position: relative;
    overflow: hidden;
  }
  .post-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); }
  .post-card .delete-btn {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.2);
    color: #ff6b6b; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: all 0.2s;
  }
  .post-card:hover .delete-btn { opacity: 1; }
  .post-card .delete-btn:hover { background: rgba(255,60,60,0.3); }
  .post-card-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .post-card-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .post-card-meta { flex: 1; }
  .post-card-name { font-size: 13px; font-weight: 600; }
  .post-card-time { font-size: 11px; color: var(--text-3); }
  .post-card-body { font-size: 14px; color: var(--text-2); line-height: 1.7; margin-bottom: 14px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .post-card-footer {
    display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-3);
  }
  .post-card-footer span { display: flex; align-items: center; gap: 4px; }

  /* Bubble variants */
  .post-card.b1 { background: var(--b1); border-color: var(--b1-border); }
  .post-card.b2 { background: var(--b2); border-color: var(--b2-border); }
  .post-card.b3 { background: var(--b3); border-color: var(--b3-border); }
  .post-card.b4 { background: var(--b4); border-color: var(--b4-border); }
  .post-card.b5 { background: var(--b5); border-color: var(--b5-border); }
  .post-card.b6 { background: var(--b6); border-color: var(--b6-border); }
  .post-card.b7 { background: var(--b7); border-color: var(--b7-border); }
  .post-card.b8 { background: var(--b8); border-color: var(--b8-border); }

  /* Comments list */
  .comment-list { display: flex; flex-direction: column; gap: 12px; }
  .comment-item {
    padding: 18px 20px; border-radius: var(--radius-bubble);
    background: var(--bg-card); border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .comment-item:hover { background: var(--bg-card-hover); transform: translateX(4px); }
  .comment-text { font-size: 14px; color: var(--text-1); margin-bottom: 10px; line-height: 1.7; }
  .comment-meta {
    display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-3);
  }
  .comment-link {
    color: var(--brand); text-decoration: none; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .comment-link:hover { text-decoration: underline; }

  /* Bookmarks */
  .bookmark-card .post-card .delete-btn { display: none; }
  .bookmark-card .unbookmark-btn {
    position: absolute; top: 12px; right: 12px;
    padding: 4px 12px; border-radius: var(--radius-pill);
    background: rgba(255,165,89,0.15); border: 1px solid rgba(255,165,89,0.2);
    color: #FFA559; font-size: 12px; cursor: pointer;
    opacity: 0; transition: all 0.2s;
  }
  .bookmark-card:hover .unbookmark-btn { opacity: 1; }
  .bookmark-card .unbookmark-btn:hover { background: rgba(255,165,89,0.3); }

  /* Settings */
  .settings-section {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-bubble); padding: 28px;
    margin-bottom: 20px;
  }
  .settings-title {
    font-size: 16px; font-weight: 600; margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .form-group { margin-bottom: 20px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label {
    display: block; font-size: 13px; font-weight: 500;
    color: var(--text-2); margin-bottom: 8px;
  }
  .form-input {
    width: 100%; max-width: 400px; padding: 12px 16px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-1); font-size: 14px;
    font-family: var(--font); outline: none; transition: all 0.2s;
  }
  .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(124,92,252,0.15); }
  .form-input::placeholder { color: var(--text-3); }
  .form-hint { font-size: 12px; color: var(--text-3); margin-top: 6px; }
  .form-btn {
    padding: 10px 28px; border-radius: var(--radius-pill);
    border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .form-btn-primary {
    background: var(--brand); color: #fff;
  }
  .form-btn-primary:hover { background: #6a4ce0; transform: translateY(-1px); }

  /* Toggle */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 400px;
  }
  .toggle-label { font-size: 14px; color: var(--text-1); }
  .toggle-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .toggle {
    width: 48px; height: 26px; border-radius: 13px;
    background: rgba(255,255,255,0.1); cursor: pointer;
    position: relative; transition: all 0.3s;
  }
  .toggle.active { background: var(--brand); }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff; transition: all 0.3s;
  }
  .toggle.active::after { left: 25px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .nav { padding: 0 16px; }
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%; min-width: 100%;
      position: relative; top: 0; height: auto;
      border-right: none; border-bottom: 1px solid var(--border);
      padding: 20px 16px;
    }
    .user-card { display: flex; text-align: left; align-items: center; gap: 16px; padding: 16px; }
    .user-avatar { width: 56px; height: 56px; margin: 0; flex-shrink: 0; }
    .user-avatar svg { width: 32px; height: 32px; }
    .user-stats { border-top: none; padding-top: 0; gap: 16px; }
    .sidebar-nav { flex-direction: row; overflow-x: auto; gap: 8px; }
    .sidebar-nav-item {
      white-space: nowrap; padding: 8px 16px; border-radius: var(--radius-pill);
      border-left: none !important; padding-left: 16px !important;
    }
    .sidebar-nav-item.active {
      background: var(--brand); color: #fff;
      border-left: none;
    }
    .content { padding: 20px 16px; }
    .stats-banner { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-card { padding: 14px 8px; }
    .stat-card .num { font-size: 22px; }
    .post-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="stars" id="stars"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Nav -->
<nav class="nav">
  <a class="nav-logo" href="#">
    <span>🫧</span> 匿名星球
  </a>
  <div class="nav-right">
    <button class="nav-icon-btn" title="搜索">🔍</button>
    <button class="nav-icon-btn" title="通知">🔔</button>
    <div class="nav-avatar" style="background: linear-gradient(135deg, var(--brand), var(--cyan));"></div>
  </div>
</nav>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="user-card">
      <div class="user-avatar">
        <svg viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="18" r="8" fill="rgba(255,255,255,0.9)"/>
          <path d="M8 42c0-8.837 7.163-16 16-16s16 7.163 16 16" fill="rgba(255,255,255,0.7)"/>
          <rect x="12" y="8" width="6" height="6" rx="1" fill="rgba(255,255,255,0.3)" transform="rotate(15 15 11)"/>
          <rect x="30" y="10" width="5" height="5" rx="1" fill="rgba(255,255,255,0.25)" transform="rotate(-10 32 12)"/>
          <circle cx="24" cy="18" r="3" fill="rgba(124,92,252,0.6)"/>
        </svg>
      </div>
      <div>
        <div class="user-name">星际旅行者 #4827</div>
        <div class="user-email">u***2@example.com</div>
      </div>
      <div class="user-stats">
        <div class="user-stat-item">
          <div class="user-stat-num">23</div>
          <div class="user-stat-label">发布</div>
        </div>
        <div class="user-stat-item">
          <div class="user-stat-num">156</div>
          <div class="user-stat-label">评论</div>
        </div>
        <div class="user-stat-item">
          <div class="user-stat-num">892</div>
          <div class="user-stat-label">获赞</div>
        </div>
      </div>
    </div>

    <div class="sidebar-nav">
      <button class="sidebar-nav-item active" onclick="switchTab('posts')">
        <span class="icon">📝</span> 我的发布
        <span class="badge">23</span>
      </button>
      <button class="sidebar-nav-item" onclick="switchTab('comments')">
        <span class="icon">💬</span> 我的评论
        <span class="badge">156</span>
      </button>
      <button class="sidebar-nav-item" onclick="switchTab('bookmarks')">
        <span class="icon">⭐</span> 我的收藏
        <span class="badge">8</span>
      </button>
      <button class="sidebar-nav-item" onclick="switchTab('settings')">
        <span class="icon">⚙️</span> 账号设置
      </button>
    </div>
  </aside>

  <!-- Content -->
  <main class="content">

    <!-- Posts Section -->
    <div class="content-section active" id="section-posts">
      <div class="section-title">📝 我的发布</div>
      <div class="stats-banner">
        <div class="stat-card">
          <div class="num">23</div>
          <div class="label">总发布</div>
        </div>
        <div class="stat-card">
          <div class="num">156</div>
          <div class="label">总评论</div>
        </div>
        <div class="stat-card">
          <div class="num">892</div>
          <div class="label">获赞数</div>
        </div>
      </div>
      <div class="post-grid" id="postGrid"></div>
    </div>

    <!-- Comments Section -->
    <div class="content-section" id="section-comments">
      <div class="section-title">💬 我的评论</div>
      <div class="comment-list" id="commentList"></div>
    </div>

    <!-- Bookmarks Section -->
    <div class="content-section" id="section-bookmarks">
      <div class="section-title">⭐ 我的收藏</div>
      <div class="post-grid" id="bookmarkGrid"></div>
    </div>

    <!-- Settings Section -->
    <div class="content-section" id="section-settings">
      <div class="section-title">⚙️ 账号设置</div>

      <div class="settings-section">
        <div class="settings-title">修改昵称</div>
        <div class="form-group">
          <label class="form-label">默认匿名昵称</label>
          <input class="form-input" type="text" value="星际旅行者 #4827" placeholder="输入新昵称">
          <div class="form-hint">修改后将在新发布的内容中显示</div>
        </div>
        <button class="form-btn form-btn-primary">保存昵称</button>
      </div>

      <div class="settings-section">
        <div class="settings-title">修改密码</div>
        <div class="form-group">
          <label class="form-label">当前密码</label>
          <input class="form-input" type="password" placeholder="请输入当前密码">
        </div>
        <div class="form-group">
          <label class="form-label">新密码</label>
          <input class="form-input" type="password" placeholder="请输入新密码">
        </div>
        <div class="form-group">
          <label class="form-label">确认新密码</label>
          <input class="form-input" type="password" placeholder="请再次输入新密码">
        </div>
        <button class="form-btn form-btn-primary">更新密码</button>
      </div>

      <div class="settings-section">
        <div class="settings-title">显示设置</div>
        <div class="form-group">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">深色模式</div>
              <div class="toggle-desc">当前使用深色宇宙主题</div>
            </div>
            <div class="toggle active" onclick="this.classList.toggle('active')"></div>
          </div>
        </div>
        <div class="form-group">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">消息通知</div>
              <div class="toggle-desc">收到评论和点赞时提醒</div>
            </div>
            <div class="toggle active" onclick="this.classList.toggle('active')"></div>
          </div>
