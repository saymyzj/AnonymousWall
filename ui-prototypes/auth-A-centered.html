<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth A — Centered Card (Apple ID Style)</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0B0D1A;
    --bg-card: rgba(255,255,255,0.04);
    --text-1: #E8E6F0;
    --text-2: #9896A8;
    --text-3: #5D5B6E;
    --brand: #7C5CFC;
    --brand-glow: rgba(124,92,252,0.25);
    --pink: #FF6B9D;
    --cyan: #06D6A0;
    --border: rgba(255,255,255,0.08);
    --radius-card: 24px;
    --radius-pill: 999px;
    --radius-input: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Star particles container */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: var(--max-o, 0.8); }
  }

  /* Nebula blurs */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,92,252,0.15), transparent 70%);
    top: -10%; left: -10%;
  }
  .nebula-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,107,157,0.1), transparent 70%);
    bottom: -5%; right: -5%;
  }
  .nebula-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(6,214,160,0.08), transparent 70%);
    top: 50%; left: 60%;
    transform: translate(-50%, -50%);
  }

  /* Floating bubble emoji particles */
  .bubble-particle {
    position: fixed;
    font-size: 20px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
    animation: floatBubble var(--dur) ease-in-out infinite;
  }
  @keyframes floatBubble {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    33% { transform: translateY(calc(var(--dy) * 1px)) rotate(10deg); }
    66% { transform: translateY(calc(var(--dy) * -0.5px)) rotate(-5deg); }
  }

  /* Auth card */
  .auth-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 48px 40px 40px;
    margin: 20px;
  }

  /* Logo area */
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
  }
  .logo-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-1);
    margin-bottom: 6px;
  }
  .logo-tagline {
    font-size: 14px;
    color: var(--text-2);
  }

  /* Tab switch */
  .tab-switch {
    display: flex;
    background: rgba(255,255,255,0.04);
    border-radius: var(--radius-pill);
    padding: 4px;
    margin-bottom: 32px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-3);
    background: none;
    border: none;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: var(--font);
  }
  .tab-btn.active {
    background: var(--brand);
    color: #fff;
    box-shadow: 0 2px 12px var(--brand-glow);
  }

  /* Form */
  .form-panel { display: none; }
  .form-panel.active { display: block; }

  .input-group {
    margin-bottom: 18px;
  }
  .input-label {
    display: block;
    font-size: 13px;
    color: var(--text-2);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .input-field {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-input);
    color: var(--text-1);
    font-size: 15px;
    font-family: var(--font);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .input-field::placeholder { color: var(--text-3); }
  .input-field:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-glow);
  }

  /* Verification code row */
  .verify-row {
    display: flex;
    gap: 12px;
  }
  .verify-row .input-field { flex: 1; }
  .verify-btn {
    padding: 14px 20px;
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.3);
    border-radius: var(--radius-input);
    color: var(--brand);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--font);
    transition: all 0.2s;
  }
  .verify-btn:hover {
    background: rgba(124,92,252,0.25);
  }

  /* Password strength */
  .password-strength {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    height: 4px;
  }
  .strength-seg {
    flex: 1;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    transition: background 0.3s;
  }
  .strength-seg.weak { background: #FF6B6B; }
  .strength-seg.medium { background: #FFC93C; }
  .strength-seg.strong { background: var(--cyan); }
  .strength-text {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 6px;
  }

  /* Checkbox row */
  .form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-2);
    cursor: pointer;
  }
  .remember-me input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--brand);
  }
  .forgot-link {
    color: var(--brand);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .forgot-link:hover { opacity: 0.8; }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    border: none;
    border-radius: var(--radius-pill);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px var(--brand-glow);
  }
  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(124,92,252,0.35);
  }
  .submit-btn:active { transform: translateY(0); }

  /* Toggle link */
  .toggle-link {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--text-2);
  }
  .toggle-link a {
    color: var(--brand);
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
  }
  .toggle-link a:hover { text-decoration: underline; }

  /* Success state */
  .success-state {
    display: none;
    text-align: center;
    padding: 20px 0;
  }
  .success-state.active { display: block; }
  .success-avatar {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--brand), var(--cyan));
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 16px;
  }
  .success-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 6px;
  }
  .success-msg {
    font-size: 14px;
    color: var(--text-2);
  }
</style>
</head>
<body>

<!-- Nebula background -->
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Star particles -->
<div class="stars" id="stars"></div>

<!-- Floating bubble emoji particles -->
<div id="bubbleParticles"></div>

<!-- Auth Card -->
<div class="auth-card" id="authCard">
  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-icon">🫧</div>
    <div class="logo-title">匿名气泡墙</div>
    <div class="logo-tagline">在星空中留下你的声音</div>
  </div>

  <!-- Tabs -->
  <div class="tab-switch" id="tabSwitch">
    <button class="tab-btn active" data-tab="login">登录</button>
    <button class="tab-btn" data-tab="register">注册</button>
  </div>

  <!-- Login Form -->
  <div class="form-panel active" id="panel-login">
    <div class="input-group">
      <label class="input-label">邮箱地址</label>
      <input class="input-field" type="email" placeholder="请输入邮箱">
    </div>
    <div class="input-group">
      <label class="input-label">密码</label>
      <input class="input-field" type="password" placeholder="请输入密码" id="loginPwd">
    </div>
    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox"> 记住我
      </label>
      <a href="#" class="forgot-link">忘记密码?</a>
    </div>
    <button class="submit-btn" onclick="handleLogin()">登 录</button>
    <div class="toggle-link">
      还没有账号？<a onclick="switchTab('register')">立即注册</a>
    </div>
  </div>

  <!-- Register Form -->
  <div class="form-panel" id="panel-register">
    <div class="input-group">
      <label class="input-label">邮箱地址</label>
      <input class="input-field" type="email" placeholder="请输入邮箱">
    </div>
    <div class="input-group">
      <label class="input-label">密码</label>
      <input class="input-field" type="password" placeholder="至少8位，需含字母和数字" id="regPwd" oninput="checkStrength(this.value)">
      <div class="password-strength" id="strengthBar">
        <div class="strength-seg" id="seg1"></div>
        <div class="strength-seg" id="seg2"></div>
        <div class="strength-seg" id="seg3"></div>
      </div>
      <div class="strength-text" id="strengthText"></div>
    </div>
    <div class="input-group">
      <label class="input-label">确认密码</label>
      <input class="input-field" type="password" placeholder="再次输入密码">
    </div>
    <div class="input-group">
      <label class="input-label">邮箱验证码</label>
      <div class="verify-row">
        <input class="input-field" type="text" placeholder="输入验证码">
        <button class="verify-btn" id="sendCodeBtn" onclick="sendCode()">发送验证码</button>
      </div>
    </div>
    <button class="submit-btn" onclick="handleRegister()" style="margin-top: 8px;">注 册</button>
    <div class="toggle-link">
      已有账号？<a onclick="switchTab('login')">去登录</a>
    </div>
  </div>

  <!-- Success state -->
  <div class="success-state" id="successState">
    <div class="success-avatar">🐼</div>
    <div class="success-name" id="anonName">匿名熊猫#3927</div>
    <div class="success-msg">欢迎来到匿名气泡宇宙！</div>
  </div>
</div>

<script>
  // Generate star particles
  (function() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
      star.style.setProperty('--max-o', (0.3 + Math.random() * 0.7).toFixed(2));
      star.style.animationDelay = (Math.random() * 5) + 's';
      if (Math.random() > 0.7) {
        star.style.width = '3px';
        star.style.height = '3px';
      }
      container.appendChild(star);
    }
  })();

  // Generate floating bubble emoji particles
  (function() {
    const emojis = ['🫧', '✨', '💫', '🌟', '⭐', '🔮', '💜', '🩷'];
    const container = document.getElementById('bubbleParticles');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'bubble-particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.setProperty('--dur', (6 + Math.random() * 8) + 's');
      p.style.setProperty('--dy', (15 + Math.random() * 30).toFixed(0));
      p.style.animationDelay = (Math.random() * 6) + 's';
      p.style.fontSize = (16 + Math.random() * 16) + 'px';
      container.appendChild(p);
    }
  })();

  // Tab switching
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    document.querySelectorAll('.form-panel').forEach(panel => {
      panel.classList.remove('active');
    });
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('successState').classList.remove('active');
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Password strength checker
  function checkStrength(val) {
    const seg1 = document.getElementById('seg1');
    const seg2 = document.getElementById('seg2');
    const seg3 = document.getElementById('seg3');
    const text = document.getElementById('strengthText');

    seg1.className = 'strength-seg';
    seg2.className = 'strength-seg';
    seg3.className = 'strength-seg';

    if (val.length === 0) { text.textContent = ''; return; }

    const hasLetter = /[a-zA-Z]/.test(val);
    const hasNumber = /[0-9]/.test(val);
    const hasSpecial = /[^a-zA-Z0-9]/.test(val);
    const long = val.length >= 8;

    let score = 0;
    if (long) score++;
    if (hasLetter && hasNumber) score++;
    if (hasSpecial && val.length >= 10) score++;

    if (score >= 1) { seg1.classList.add('weak'); text.textContent = '弱'; text.style.color = '#FF6B6B'; }
    if (score >= 2) { seg2.classList.add('medium'); text.textContent = '中'; text.style.color = '#FFC93C'; }
    if (score >= 3) { seg3.classList.add('strong'); text.textContent = '强'; text.style.color = '#06D6A0'; }
  }

  // Send verification code (demo)
  function sendCode() {
    const btn = document.getElementById('sendCodeBtn');
    btn.disabled = true;
    let count = 60;
    btn.textContent = count + 's';
    btn.style.opacity = '0.5';
    const timer = setInterval(() => {
      count--;
      btn.textContent = count + 's';
      if (count <= 0) {
        clearInterval(timer);
        btn.textContent = '发送验证码';
        btn.disabled = false;
        btn.style.opacity = '1';
      }
    }, 1000);
  }

  // Demo login
  function handleLogin() {
    const animals = ['熊猫','狐狸','小猫','兔子','柴犬','考拉','企鹅','海豚'];
    const emojis = ['🐼','🦊','🐱','🐰','🐕','🐨','🐧','🐬'];
    const idx = Math.floor(Math.random() * animals.length);
    const num = Math.floor(1000 + Math.random() * 9000);

    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('successState').classList.add('active');
    document.querySelector('.success-avatar').textContent = emojis[idx];
    document.getElementById('anonName').textContent = '匿名' + animals[idx] + '#' + num;
  }

  // Demo register
  function handleRegister() {
    handleLogin();
  }
</script>
</body>
</html>
