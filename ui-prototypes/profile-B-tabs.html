<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile B — Top Tabs (个人中心)</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0B0D1A;
    --bg-surface: #12152A;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.08);
    --text-1: #E8E6F0;
    --text-2: #9896A8;
    --text-3: #5D5B6E;
    --brand: #7C5CFC;
    --brand-glow: rgba(124,92,252,0.25);
    --pink: #FF6B9D;
    --pink-glow: rgba(255,107,157,0.2);
    --cyan: #06D6A0;
    --radius-bubble: 24px;
    --radius-pill: 999px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
    --border: rgba(255,255,255,0.08);

    --b1: linear-gradient(135deg, rgba(255,107,157,0.18), rgba(255,182,193,0.12));
    --b2: linear-gradient(135deg, rgba(255,165,89,0.18), rgba(255,200,120,0.12));
    --b3: linear-gradient(135deg, rgba(6,214,160,0.18), rgba(100,230,180,0.12));
    --b4: linear-gradient(135deg, rgba(100,180,255,0.18), rgba(150,200,255,0.12));
    --b5: linear-gradient(135deg, rgba(124,92,252,0.18), rgba(180,160,255,0.12));
    --b6: linear-gradient(135deg, rgba(255,230,100,0.18), rgba(255,240,150,0.12));
    --b7: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    --b8: linear-gradient(135deg, rgba(200,160,120,0.18), rgba(220,180,140,0.12));

    --b1-border: rgba(255,107,157,0.2);
    --b2-border: rgba(255,165,89,0.2);
    --b3-border: rgba(6,214,160,0.2);
    --b4-border: rgba(100,180,255,0.2);
    --b5-border: rgba(124,92,252,0.2);
    --b6-border: rgba(255,230,100,0.2);
    --b7-border: rgba(255,255,255,0.08);
    --b8-border: rgba(200,160,120,0.2);
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-1);
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== STARS ===== */
  .stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 3s ease-in-out infinite alternate; }
  @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }
  .nebula { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
  .nebula-1 { width: 500px; height: 500px; top: -150px; right: -100px; background: var(--brand-glow); }
  .nebula-2 { width: 400px; height: 400px; bottom: -100px; left: -80px; background: var(--pink-glow); }
  .nebula-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(6,214,160,0.08); }

  /* ===== NAV ===== */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 64px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    background: rgba(11,13,26,0.7);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; text-decoration: none;
  }
  .nav-logo span { font-size: 22px; -webkit-text-fill-color: initial; }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04); color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: all 0.2s;
  }
  .nav-icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-1); }

  /* ===== MAIN WRAP ===== */
  .main-wrap {
    position: relative; z-index: 1;
    max-width: 800px; margin: 0 auto;
    padding-top: 64px;
  }

  /* ===== HERO PROFILE ===== */
  .hero {
    text-align: center; padding: 48px 24px 32px;
    position: relative;
  }
  .hero-avatar-ring {
    width: 104px; height: 104px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand), var(--pink), var(--cyan));
    padding: 4px; margin: 0 auto 20px;
    animation: ringRotate 6s linear infinite;
  }
  @keyframes ringRotate {
    0% { background: linear-gradient(0deg, var(--brand), var(--pink), var(--cyan)); }
    33% { background: linear-gradient(120deg, var(--brand), var(--pink), var(--cyan)); }
    66% { background: linear-gradient(240deg, var(--brand), var(--pink), var(--cyan)); }
    100% { background: linear-gradient(360deg, var(--brand), var(--pink), var(--cyan)); }
  }
  .hero-avatar {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-avatar svg { width: 56px; height: 56px; }
  .hero-name {
    font-size: 24px; font-weight: 700; margin-bottom: 6px;
  }
  .hero-email {
    font-size: 14px; color: var(--text-3); margin-bottom: 4px;
  }
  .hero-join {
    font-size: 13px; color: var(--text-3); margin-bottom: 20px;
  }
  .hero-stats {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; font-size: 14px; color: var(--text-2); margin-bottom: 20px;
  }
  .hero-stats .num { font-weight: 700; color: var(--text-1); }
  .hero-stats .divider { color: var(--text-3); }
  .hero-edit-btn {
    padding: 8px 24px; border-radius: var(--radius-pill);
    border: 1px solid var(--border); background: transparent;
    color: var(--text-1); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; font-family: var(--font);
  }
  .hero-edit-btn:hover {
    border-color: var(--brand); color: var(--brand);
    background: rgba(124,92,252,0.08);
  }

  /* ===== TAB BAR ===== */
  .tab-bar-wrap {
    position: sticky; top: 64px; z-index: 50;
    padding: 12px 0;
    background: rgba(11,13,26,0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .tab-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: var(--radius-pill);
    width: fit-content; margin: 0 auto;
    border: 1px solid var(--border);
  }
  .tab-item {
    padding: 10px 24px; border-radius: var(--radius-pill);
    border: none; background: transparent;
    font-size: 14px; font-weight: 500; color: var(--text-2);
    cursor: pointer; transition: all 0.25s; font-family: var(--font);
    white-space: nowrap;
  }
  .tab-item:hover { color: var(--text-1); }
  .tab-item.active {
    background: var(--brand); color: #fff;
    box-shadow: 0 2px 12px rgba(124,92,252,0.3);
  }

  /* ===== CONTENT AREA ===== */
  .tab-content { padding: 28px 16px 60px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Masonry posts */
  .masonry {
    columns: 2; column-gap: 18px;
  }
  .masonry-item {
    break-inside: avoid; margin-bottom: 18px;
    border-radius: var(--radius-bubble);
    border: 1px solid var(--border);
    padding: 20px; cursor: pointer;
    transition: all 0.3s; position: relative;
  }
  .masonry-item:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); }
  .masonry-item .post-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .masonry-item .post-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand), var(--pink));
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    flex-shrink: 0;
  }
  .masonry-item .post-name { font-size: 13px; font-weight: 600; }
  .masonry-item .post-time { font-size: 11px; color: var(--text-3); }
  .masonry-item .post-body {
    font-size: 14px; color: var(--text-2); line-height: 1.75;
    margin-bottom: 14px;
  }
  .masonry-item .post-footer {
    display: flex; align-items: center; gap: 16px;
    font-size: 12px; color: var(--text-3);
  }
  .masonry-item .post-footer span { display: flex; align-items: center; gap: 4px; }

  /* Delete / unbookmark buttons */
  .action-btn {
    position: absolute; top: 12px; right: 12px;
    padding: 4px 14px; border-radius: var(--radius-pill);
    font-size: 12px; cursor: pointer;
    opacity: 0; transition: all 0.2s; font-family: var(--font);
  }
  .masonry-item:hover .action-btn { opacity: 1; }
  .action-btn.delete {
    background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.2); color: #ff6b6b;
  }
  .action-btn.delete:hover { background: rgba(255,60,60,0.3); }
  .action-btn.unbookmark {
    background: rgba(255,165,89,0.15); border: 1px solid rgba(255,165,89,0.2); color: #FFA559;
  }
  .action-btn.unbookmark:hover { background: rgba(255,165,89,0.3); }

  /* Bubble color classes */
  .b1 { background: var(--b1); border-color: var(--b1-border); }
  .b2 { background: var(--b2); border-color: var(--b2-border); }
  .b3 { background: var(--b3); border-color: var(--b3-border); }
  .b4 { background: var(--b4); border-color: var(--b4-border); }
  .b5 { background: var(--b5); border-color: var(--b5-border); }
  .b6 { background: var(--b6); border-color: var(--b6-border); }
  .b7 { background: var(--b7); border-color: var(--b7-border); }
  .b8 { background: var(--b8); border-color: var(--b8-border); }

  /* Comment list */
  .comment-list { display: flex; flex-direction: column; gap: 12px; }
  .comment-card {
    padding: 20px 22px; border-radius: var(--radius-bubble);
    background: var(--bg-card); border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .comment-card:hover { background: var(--bg-card-hover); transform: translateX(4px); }
  .comment-card .comment-text {
    font-size: 14px; color: var(--text-1); line-height: 1.75;
    margin-bottom: 12px;
  }
  .comment-card .comment-meta {
    display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
    font-size: 12px; color: var(--text-3);
  }
  .comment-card .comment-origin {
    color: var(--brand); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .comment-card .comment-origin:hover { text-decoration: underline; }

  /* Settings */
  .settings-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-bubble); padding: 28px;
    margin-bottom: 20px;
  }
  .settings-card-title {
    font-size: 16px; font-weight: 600; margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .form-group { margin-bottom: 20px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-2); margin-bottom: 8px; }
  .form-input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-1); font-size: 14px;
    font-family: var(--font); outline: none; transition: all 0.2s;
  }
  .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(124,92,252,0.15); }
  .form-input::placeholder { color: var(--text-3); }
  .form-hint { font-size: 12px; color: var(--text-3); margin-top: 6px; }
  .form-btn {
    padding: 10px 28px; border-radius: var(--radius-pill);
    border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
    font-family: var(--font);
  }
  .form-btn-primary { background: var(--brand); color: #fff; }
  .form-btn-primary:hover { background: #6a4ce0; transform: translateY(-1px); }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .toggle-label-text { font-size: 14px; color: var(--text-1); }
  .toggle-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .toggle {
    width: 48px; height: 26px; border-radius: 13px;
    background: rgba(255,255,255,0.1); cursor: pointer;
    position: relative; transition: all 0.3s; flex-shrink: 0;
  }
  .toggle.active { background: var(--brand); }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff; transition: all 0.3s;
  }
  .toggle.active::after { left: 25px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .nav { padding: 0 16px; }
    .hero { padding: 32px 16px 24px; }
    .hero-avatar-ring { width: 84px; height: 84px; }
    .hero-avatar { width: 76px; height: 76px; }
    .hero-avatar svg { width: 44px; height: 44px; }
    .hero-name { font-size: 20px; }
    .hero-stats { font-size: 13px; flex-wrap: wrap; }
    .tab-bar { gap: 2px; padding: 3px; }
    .tab-item { padding: 8px 14px; font-size: 13px; }
    .masonry { columns: 1; }
    .tab-content { padding: 20px 12px 40px; }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="stars" id="stars"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Nav -->
<nav class="nav">
  <a class="nav-logo" href="#">
    <span>🫧</span> 匿名星球
  </a>
  <div class="nav-right">
    <button class="nav-icon-btn">🔍</button>
    <button class="nav-icon-btn">🔔</button>
    <button class="nav-icon-btn" style="border-color:var(--brand);">👤</button>
  </div>
</nav>

<!-- Main -->
<div class="main-wrap">

  <!-- Hero Profile -->
  <div class="hero">
    <div class="hero-avatar-ring">
      <div class="hero-avatar">
        <svg viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="20" r="9" fill="rgba(255,255,255,0.9)"/>
          <path d="M10 50c0-9.941 8.059-18 18-18s18 8.059 18 18" fill="rgba(255,255,255,0.7)"/>
          <rect x="14" y="8" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.3)" transform="rotate(15 17.5 11.5)"/>
          <rect x="35" y="10" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.25)" transform="rotate(-10 38 13)"/>
          <circle cx="28" cy="20" r="3.5" fill="rgba(124,92,252,0.6)"/>
        </svg>
      </div>
    </div>
    <div class="hero-name">星际旅行者 #4827</div>
    <div class="hero-email">u***2@example.com</div>
    <div class="hero-join">🚀 2024年3月加入匿名星球</div>
    <div class="hero-stats">
      <span><span class="num">23</span> 发布</span>
      <span class="divider">&middot;</span>
      <span><span class="num">156</span> 评论</span>
      <span class="divider">&middot;</span>
      <span><span class="num">892</span> 获赞</span>
    </div>
    <button class="hero-edit-btn">编辑个人资料</button>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar-wrap">
    <div class="tab-bar">
      <button class="tab-item active" onclick="switchTab('posts', this)">我的发布</button>
      <button class="tab-item" onclick="switchTab('comments', this)">我的评论</button>
      <button class="tab-item" onclick="switchTab('bookmarks', this)">我的收藏</button>
      <button class="tab-item" onclick="switchTab('settings', this)">设置</button>
    </div>
  </div>

  <!-- Content -->
  <div class="tab-content">

    <!-- Posts -->
    <div class="tab-panel active" id="panel-posts">
      <div class="masonry" id="masonryPosts"></div>
    </div>

    <!-- Comments -->
    <div class="tab-panel" id="panel-comments">
      <div class="comment-list" id="commentList"></div>
    </div>

    <!-- Bookmarks -->
    <div class="tab-panel" id="panel-bookmarks">
      <div class="masonry" id="masonryBookmarks"></div>
    </div>

    <!-- Settings -->
    <div class="tab-panel" id="panel-settings">
      <div class="settings-card">
        <div class="settings-card-title">修改昵称</div>
        <div class="form-group">
          <label class="form-label">默认匿名昵称</label>
          <input class="form-input" type="text" value="星际旅行者 #4827" placeholder="输入新昵称">
          <div class="form-hint">修改后将在新发布的内容中显示</div>
        </div>
        <button class="form-btn form-btn-primary">保存昵称</button>
      </div>

      <div class="settings-card">
        <div class="settings-card-title">修改密码</div>
        <div class="form-group">
          <label class="form-label">当前密码</label>
          <input class="form-input" type="password" placeholder="请输入当前密码">
        </div>
        <div class="form-group">
          <label class="form-label">新密码</label>
          <input class="form-input" type="password" placeholder="请输入新密码 (至少8位)">
        </div>
        <div class="form-group">
          <label class="form-label">确认新密码</label>
          <input class="form-input" type="password" placeholder="请再次输入新密码">
        </div>
        <button class="form-btn form-btn-primary">更新密码</button>
      </div>

      <div class="settings-card">
        <div class="settings-card-title">显示设置</div>
        <div class="form-group">
          <div class="toggle-row">
            <div>
              <div class="toggle-label-text">深色模式</div>
              <div class="toggle-desc">当前使用深色宇宙主题</div>
            </div>
            <div class="toggle active" onclick="this.classList.toggle('active')"></div>
          </div>
        </div>
        <div class="form-group">
          <div class="toggle-row">
            <div>
              <div class="toggle-label-text">消息通知</div>
              <div class="toggle-desc">收到评论和点赞时提醒</div>
            </div>
            <div class="toggle active" onclick="this.classList.toggle('active')"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// Stars
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
})();

// Tab switch
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// Mock data
const posts = [
  { body: '有时候觉得，孤独不是身边没有人，而是心里的话找不到能说的人。深夜的城市灯火辉煌，却照不亮内心的角落。', time: '2小时前', likes: 42, comments: 8, color: 'b1' },
  { body: '同事把咖啡倒在了老板的键盘上，整个办公室都安静了。然后老板说："这是我喝过最贵的咖啡。"', time: '5小时前', likes: 128, comments: 23, color: 'b2' },
  { body: '最近发现费曼学习法真的很有效。把学到的东西用最简单的话解释给别人听，如果对方能理解，说明你真的学会了。推荐给所有想提升学习效率的朋友。', time: '昨天', likes: 89, comments: 15, color: 'b3' },
  { body: '远程工作一年了，最大的感受是自律比能力更重要。', time: '2天前', likes: 67, comments: 12, color: 'b4' },
  { body: '《星际穿越》重刷了第三遍，每次看都有新的感悟。关于时间、爱和人类的命运，诺兰把宏大和细腻完美结合。那句"Love is the one thing capable of transcending time and space"每次都让我起鸡皮疙瘩。', time: '3天前', likes: 156, comments: 31, color: 'b5' },

// Render
function renderPosts() {
  const el = document.getElementById('masonryPosts');
  el.innerHTML = posts.map((p, i) => `
    <div class="masonry-item ${p.color}">
      <button class="action-btn delete" onclick="event.stopPropagation()">删除</button>
      <div class="post-header">
        <div class="post-avatar">👤</div>
        <div>
          <div class="post-name">星际旅行者 #4827</div>
          <div class="post-time">${p.time}</div>
        </div>
      </div>
      <div class="post-body">${p.body}</div>
      <div class="post-footer">
        <span>❤️ ${p.likes}</span>
        <span>💬 ${p.comments}</span>
        <span>👁 ${Math.floor(p.likes * 3.2)}</span>
      </div>
    </div>
  `).join('');
}

function renderComments() {
  const el = document.getElementById('commentList');
  el.innerHTML = comments.map(c => `
    <div class="comment-card">
      <div class="comment-text">${c.text}</div>
      <div class="comment-meta">
        <span>${c.time}</span>
        <a class="comment-origin" href="#">📎 来自帖子: ${c.post}</a>
      </div>
    </div>
  `).join('');
}

function renderBookmarks() {
  const el = document.getElementById('masonryBookmarks');
  const bp = posts.slice(0, 5);
  const colors = ['b3','b5','b1','b4','b6'];
  el.innerHTML = bp.map((p, i) => `
    <div class="masonry-item ${colors[i]}">
      <button class="action-btn unbookmark" onclick="event.stopPropagation()">取消收藏</button>
      <div class="post-header">
        <div class="post-avatar" style="background:linear-gradient(135deg,var(--cyan),var(--brand))">👤</div>
        <div>
          <div class="post-name">匿名用户 #${1000 + i * 317}</div>
          <div class="post-time">${p.time}</div>
        </div>
      </div>
      <div class="post-body">${p.body}</div>
      <div class="post-footer">
        <span>❤️ ${p.likes}</span>
        <span>💬 ${p.comments}</span>
      </div>
    </div>
  `).join('');
}
