<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== App Grid ===== */
  .wb-app {
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr);
    min-height: 100vh;
  }

  /* ===== Sidebar ===== */
  .wb-sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 24px 16px;
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    color: #fff;
    border-right: 1px solid rgba(255,255,255,.06);
  }
  .wb-sidebar::-webkit-scrollbar { width: 4px; }
  .wb-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

  .wb-sidebar-brand { padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,.1); }
  .wb-sidebar-kicker {
    display: inline-flex; align-items: center; height: 24px; padding: 0 10px;
    border-radius: 999px; background: rgba(96,165,250,.2); color: #93c5fd;
    font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  }
  .wb-sidebar-brand h2 { margin: 10px 0 4px; font-size: 20px; font-weight: 800; color: #fff; line-height: 1.3; }
  .wb-sidebar-brand p { color: rgba(255,255,255,.55); font-size: 12px; line-height: 1.6; }

  .wb-sidebar-section { display: flex; flex-direction: column; gap: 6px; }
  .wb-sidebar-section-title {
    padding: 0 6px; color: rgba(255,255,255,.4); font-size: 11px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .wb-sidebar-list { display: flex; flex-direction: column; gap: 4px; }

  .wb-sidebar-link {
    display: block; padding: 10px 12px; border-radius: 10px;
    background: transparent; border: 1px solid transparent;
    color: rgba(255,255,255,.85); text-decoration: none;
    transition: background .15s, border-color .15s;
  }
  .wb-sidebar-link:hover { background: rgba(255,255,255,.07); }
  .wb-sidebar-link.active {
    background: rgba(59,130,246,.18); border-color: rgba(96,165,250,.3);
    color: #fff;
  }
  .wb-sidebar-link-top {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .wb-sidebar-link-meta { margin-top: 2px; color: rgba(255,255,255,.45); font-size: 11px; }

  .wb-sidebar-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 6px; border-radius: 999px;
    background: rgba(255,255,255,.1); color: rgba(255,255,255,.7);
    font-size: 11px; font-weight: 700;
  }
  .wb-sidebar-badge.warn { background: rgba(251,191,36,.2); color: #fde68a; }
  .wb-sidebar-badge.danger { background: rgba(239,68,68,.2); color: #fca5a5; }

  /* ===== Main Content ===== */
  .wb-main { min-width: 0; padding: 24px; }
  .wb-shell { display: flex; flex-direction: column; gap: 20px; max-width: 1200px; }

  /* ===== Page Header ===== */
  .wb-page-header {
    padding: 24px 28px; border-radius: 16px;
    background: linear-gradient(135deg, #eff6ff 0%, #fff 60%, #f0f9ff 100%);
    border: 1px solid #dbeafe;
  }
  .wb-page-eyebrow {
    display: inline-flex; align-items: center; height: 24px; padding: 0 10px;
    border-radius: 999px; background: #dbeafe; color: #1d4ed8;
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
  }
  .wb-page-header h1 { margin: 8px 0 4px; font-size: 26px; font-weight: 800; color: #0f172a; line-height: 1.2; }
  .wb-page-header p { color: #64748b; font-size: 13px; line-height: 1.6; }

  .wb-page-summary { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .wb-summary-pill {
    display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 14px;
    border-radius: 999px; background: #fff; border: 1px solid #e2e8f0;
    font-size: 12px; font-weight: 600; color: #334155;
  }
  .wb-summary-pill.warn { background: #fffbeb; border-color: #fde68a; color: #b45309; }
  .wb-summary-pill.danger { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
  .wb-summary-pill-value { font-size: 15px; font-weight: 800; }

  .wb-page-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }

  /* ===== Metrics Row ===== */
  .wb-metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .wb-metric {
    padding: 16px 18px; border-radius: 14px; background: #fff; border: 1px solid #e9eef6;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .wb-metric.warn { border-left: 3px solid #f59e0b; }
  .wb-metric.danger { border-left: 3px solid #ef4444; }
  .wb-metric-label { color: #64748b; font-size: 12px; font-weight: 500; }
  .wb-metric-value { margin-top: 4px; font-size: 28px; font-weight: 800; color: #0f172a; }

  /* ===== Grid Layouts ===== */
  .wb-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
  .wb-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .wb-split { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; }

  /* ===== Card ===== */
  .wb-card {
    background: #fff; border: 1px solid #e9eef6; border-radius: 14px;
    padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .wb-card h2 { margin: 0 0 4px; font-size: 16px; font-weight: 700; color: #0f172a; }
  .wb-card p { margin: 0; color: #64748b; font-size: 12px; line-height: 1.6; }

  /* ===== Lists ===== */
  .wb-link-list, .wb-table-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

  .wb-link-item, .wb-table-row {
    display: block; padding: 12px 14px; border-radius: 10px;
    background: #f8fafc; border: 1px solid #f1f5f9;
    color: #1e293b; text-decoration: none;
    transition: border-color .15s, box-shadow .15s;
  }
  a.wb-link-item:hover, a.wb-table-row:hover {
    border-color: #cbd5e1; box-shadow: 0 2px 6px rgba(0,0,0,.04);
  }

  .wb-link-top, .wb-table-top {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .wb-link-meta, .wb-table-meta { margin-top: 4px; color: #64748b; font-size: 11px; line-height: 1.5; }
  .wb-table-content { margin: 4px 0; color: #334155; font-size: 13px; line-height: 1.6; word-break: break-word; }

  /* ===== Badge ===== */
  .wb-badge {
    display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px;
    background: #eff6ff; color: #2563eb; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .wb-badge.warn { background: #fff7ed; color: #ea580c; }
  .wb-badge.danger { background: #fef2f2; color: #dc2626; }
  .wb-badge.success { background: #f0fdf4; color: #16a34a; }

  /* ===== Actions / Buttons ===== */
  .wb-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .wb-action {
    display: inline-flex; align-items: center; justify-content: center;
    height: 32px; padding: 0 14px; border-radius: 8px;
    background: #0f172a; color: #fff; text-decoration: none;
    font-size: 12px; font-weight: 600; border: 1px solid transparent;
    cursor: pointer; transition: opacity .15s;
  }
  .wb-action:hover { opacity: .85; }
  .wb-action.ghost { background: #f1f5f9; color: #334155; border-color: #e2e8f0; }
  .wb-action.ghost:hover { background: #e2e8f0; }
  .wb-action.warn { background: #ea580c; }
  .wb-action.danger { background: #dc2626; }
  .wb-action.success { background: #16a34a; }

  /* ===== Tabs ===== */
  .wb-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
  .wb-tab {
    display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 14px;
    border-radius: 8px; background: #f8fafc; border: 1px solid #e2e8f0;
    color: #475569; text-decoration: none; font-size: 12px; font-weight: 600;
    transition: background .15s, border-color .15s;
  }
  .wb-tab:hover { background: #e2e8f0; }
  .wb-tab.active { background: #0f172a; border-color: #0f172a; color: #fff; }

  /* ===== Filter ===== */
  .wb-filter-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 12px; }
  .wb-filter-field { display: flex; flex-direction: column; gap: 4px; }
  .wb-filter-field label { color: #64748b; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .wb-filter-field input,
  .wb-filter-field select,
  .wb-filter-field textarea {
    width: 100%; height: 38px; padding: 0 12px; border-radius: 8px;
    border: 1px solid #d1d5db; background: #fff; color: #1e293b;
    font-size: 13px; outline: none; transition: border-color .15s;
  }
  .wb-filter-field input:focus,
  .wb-filter-field select:focus,
  .wb-filter-field textarea:focus { border-color: #3b82f6; }
  .wb-filter-field textarea { height: 90px; padding: 10px 12px; resize: vertical; }

  /* ===== Empty State ===== */
  .wb-empty {
    padding: 16px; border-radius: 10px; background: #f8fafc;
    border: 1px dashed #cbd5e1; color: #94a3b8; font-size: 13px; text-align: center;
  }

  /* ===== Trend Bar ===== */
  .wb-trend-bars { display: flex; gap: 4px; align-items: flex-end; margin-top: 4px; }
  .wb-trend-bar { border-radius: 3px; min-width: 6px; transition: height .3s; }
  .wb-trend-bar.posts { background: #3b82f6; }
  .wb-trend-bar.comments { background: #f59e0b; }
  .wb-trend-bar.users { background: #10b981; }

  /* ===== Responsive ===== */
  @media (max-width: 1024px) {
    .wb-app { grid-template-columns: 1fr; }
    .wb-sidebar {
      position: fixed; top: 0; left: -280px; width: 260px;
      height: 100vh; z-index: 1000; transition: left .25s;
    }
    .wb-sidebar.open { left: 0; }
    .wb-mobile-toggle {
      display: flex; position: fixed; top: 12px; left: 12px; z-index: 1001;
      width: 40px; height: 40px; border-radius: 10px; background: #0f172a;
      color: #fff; border: none; cursor: pointer; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .wb-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 999;
    }
    .wb-overlay.open { display: block; }
    .wb-grid, .wb-grid.three, .wb-split, .wb-filter-grid { grid-template-columns: 1fr; }
  }
  @media (min-width: 1025px) {
    .wb-mobile-toggle, .wb-overlay { display: none !important; }
  }
</style>
